apiVersion: v1
kind: Secret
metadata:
  name: ${name:openapi-petstore}-bootstrap
  namespace: ${namespace:openapi-petstore}
  labels:
    app.kubernetes.io/name: ${name:openapi-petstore}
    app.kubernetes.io/component: bootstrap
    app.kubernetes.io/part-of: lightapi
type: Opaque
stringData:
  light-4j-config-password: ${light4jConfigPassword:DEV}
  config-server-client-truststore-password: ${configServerTruststorePassword:password}
  sidecar-light-portal-authorization: ${sidecar.lightPortalAuthorization:}
data:
  bootstrap.truststore: ${bootstrapTruststoreBase64}
